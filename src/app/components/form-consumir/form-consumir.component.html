<div class="form-container">
  <div class="form-header">
    <span class="close-button" (click)="closeDialog()">X</span>
  </div>
  <div class="form-body">
    <div class="form-left">
      <div class="input-group">
        <input type="text" class="input-field" (input)="onInputChange($event)" placeholder="Pick one" aria-label="Number" matInput [formControl]="myControl" [matAutocomplete]="auto">
        <mat-autocomplete #auto="matAutocomplete">
          @for (option of options; track option) {
          <mat-option [value]="option" (click)="mostrar(option)">{{option}}</mat-option>
          }
        </mat-autocomplete>
      </div>
      <div class="input-group">
        <input type="number" placeholder="Cantidad (gr)" class="input-field" #cantidadInput>
      </div>
      <div class="input-group">
        <textarea [(ngModel)]="textareaContent" class="textarea-field" disabled></textarea>
      </div>
    </div>
    <div class="form-right">
      <div class="image-placeholder">
        <img [src]="base64Image" class="image-display">
      </div>
    </div>
  </div>
  <div class="form-footer">
    <div class="btns-izq">
      <button class="propose-button" (click)="proponerAlimento()">Proponer alimento</button>
      <button class="create-button">Crear nueva receta</button>
    </div>
    <div class="btns-der">
      <button class="submit-button" (click)="guardarConsumo(cantidadInput.value)">Agregar</button>
    </div>
  </div>
</div>
